<header class="site-header">
  <div class="container">
    <div class="header-inner">
      <a href="{{ .Site.BaseURL }}" class="site-logo">
        <span class="logo-icon">⬡</span>
        <span class="logo-text">{{ .Site.Title }}</span>
      </a>
      <nav class="site-nav">
        <button class="nav-toggle" aria-label="Toggle navigation" onclick="document.querySelector('.nav-links').classList.toggle('active')">
          <span></span><span></span><span></span>
        </button>
        <ul class="nav-links">
          {{ range .Site.Menus.main }}
          <li><a href="{{ .URL }}" {{ if $.IsMenuCurrent "main" . }}class="active"{{ end }}>{{ .Name }}</a></li>
          {{ end }}
        </ul>
      </nav>
    </div>
  </div>
</header>
